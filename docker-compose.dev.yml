# Desarrollo local: panel en http://localhost:3000 (puertos publicados; sin red NPM).
# Si tras cambiar package.json ves "Cannot find module ...": reconstruye la imagen y reinstala deps
# en el volumen de node_modules, por ejemplo:
#   docker compose -f docker-compose.dev.yml build --no-cache app
#   docker compose -f docker-compose.dev.yml run --rm app npm install
#   docker compose -f docker-compose.dev.yml up
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mali-whatsapp-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./app:/usr/src/app
      - /usr/src/app/node_modules

  postgres:
    image: postgres:16-alpine
    container_name: mali-whatsapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
