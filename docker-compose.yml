services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mali-whatsapp-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - npm_proxy

  postgres:
    image: postgres:16-alpine
    container_name: mali-whatsapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

volumes:
  postgres_data:

# Nginx Proxy Manager debe poder resolver mali-whatsapp-app:3000 (misma red Docker).
networks:
  npm_proxy:
    external: true
    name: nginx-proxy-manager_default
